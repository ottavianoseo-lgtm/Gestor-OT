services:
  db:
    image: postgis/postgis:16-3.4
    container_name: gestorot-db
    env_file:
      - .env
    ports:
      - "5433:5432"
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dp_keys:/home/app/.aspnet/DataProtection-Keys

  gestor-ot-app:
    container_name: gestorot-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT}:${APP_PORT}"
    env_file:
      - .env
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
